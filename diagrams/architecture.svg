<svg xmlns="http://www.w3.org/2000/svg" width="1360" height="900" viewBox="0 0 1360 900">
  <defs>
    <style>
      .box { fill:#f8fafc; stroke:#334155; stroke-width:2; rx:10; ry:10; }
      .title { font: 700 24px Arial, sans-serif; fill:#0f172a; }
      .txt { font: 14px Arial, sans-serif; fill:#0f172a; }
      .small { font: 12px Arial, sans-serif; fill:#334155; }
      .session { fill:#eef7ff; stroke:#2563eb; stroke-width:2; rx:12; ry:12; }
      .agent { fill:#f8fafc; stroke:#64748b; stroke-width:2; rx:12; ry:12; }
      .tx { fill:#fff1f2; stroke:#b91c1c; stroke-width:2; rx:10; ry:10; }
      .jan { fill:#ecfeff; stroke:#0e7490; stroke-width:2; rx:10; ry:10; }
      .arrow { stroke:#475569; stroke-width:2; marker-end:url(#m); fill:none; }
    </style>
    <marker id="m" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#475569" />
    </marker>
  </defs>

  <text x="30" y="42" class="title">Zoro Architecture — Upgraded (Antfarm + Crawlee + Memory Loop + Chain Skills)</text>

  <rect x="60" y="90" width="180" height="60" class="box"/>
  <text x="112" y="126" class="txt">User</text>

  <rect x="280" y="80" width="250" height="80" class="box"/>
  <text x="370" y="112" class="txt">main agent</text>
  <text x="306" y="136" class="small">orchestrator + policy + synthesis</text>

  <rect x="570" y="80" width="220" height="80" class="box"/>
  <text x="620" y="112" class="txt">outline planner</text>
  <text x="595" y="136" class="small">objective/plan/risks/output</text>

  <rect x="540" y="190" width="760" height="250" class="session"/>
