<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="920" viewBox="0 0 1400 920">
  <defs><style>
  .box{fill:#f8fafc;stroke:#334155;stroke-width:2;rx:10;ry:10}
  .title{font:700 24px Arial;fill:#0f172a}.txt{font:14px Arial;fill:#0f172a}
  .small{font:12px Arial;fill:#334155}.sb{fill:#eef7ff;stroke:#2563eb;stroke-width:2;rx:12;ry:12}
  .ep{fill:#fef9c3;stroke:#a16207;stroke-width:2;rx:10;ry:10}.tx{fill:#fff1f2;stroke:#b91c1c;stroke-width:2;rx:10;ry:10}
  .jan{fill:#ecfeff;stroke:#0e7490;stroke-width:2;rx:10;ry:10}.arr{stroke:#475569;stroke-width:2;marker-end:url(#m);fill:none}
  </style><marker id="m" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#475569"/></marker></defs>
  <text x="30" y="40" class="title">Zoro Architecture — Antfarm Swarm Upgrade (Moderator + Ephemeral Workers)</text>
  <rect x="40" y="80" width="170" height="58" class="box"/><text x="95" y="115" class="txt">User</text>
  <rect x="250" y="70" width="220" height="78" class="box"/><text x="325" y="102" class="txt">main</text><text x="278" y="126" class="small">orchestrator + policy gate</text>
  <rect x="500" y="70" width="230" height="78" class="box"/><text x="575" y="102" class="txt">moderator</text><text x="520" y="126" class="small">progress watchdog + escalation</text>
  <rect x="760" y="70" width="220" height="78" class="box"/><text x="823" y="102" class="txt">planner</text><text x="784" y="126" class="small">outline-first dispatch</text>

  <rect x="220" y="190" width="1120" height="300" class="sb"/><text x="245" y="218" class="txt">Sandbox Domains</text>
  <rect x="280" y="250" width="180" height="82" class="box"/><text x="340" y="282" class="txt">research</text><text x="305" y="305" class="small">session sandbox</text>
  <rect x="490" y="250" width="180" height="82" class="box"/><text x="560" y="282" class="txt">coder</text><text x="515" y="305" class="small">session sandbox</text>
  <rect x="700" y="250" width="180" height="82" class="tx"/><text x="775" y="282" class="txt">tx</text><text x="730" y="305" class="small">agent sandbox</text>

  <rect x="930" y="236" width="360" height="240" class="ep"/><text x="952" y="262" class="txt">Ephemeral Worker Swarm (TTL-bound)</text>
  <rect x="970" y="286" width="280" height="52" class="box"/><text x="1025" y="317" class="small">worker-research-* (temporary)</text>
  <rect x="970" y="352" width="280" height="52" class="box"/><text x="1040" y="383" class="small">worker-code-* (temporary)</text>
  <rect x="970" y="418" width="280" height="52" class="box"/><text x="1032" y="449" class="small">worker-verify-* (temporary)</text>

  <rect x="220" y="530" width="300" height="170" class="jan"/><text x="328" y="562" class="txt">janitor</text><text x="250" y="586" class="small">host-mode cleanup + memory/disk hygiene</text><text x="250" y="608" class="small">runs every 30 min</text>
  <rect x="560" y="530" width="360" height="170" class="box"/><text x="665" y="562" class="txt">coordination state</text><text x="585" y="586" class="small">CREATED → CLAIMED → RUNNING → DONE</text><text x="585" y="608" class="small">FAILED/RETRYING + bounded retries</text><text x="585" y="630" class="small">JSONL audit trail + rotation</text>
  <rect x="960" y="530" width="320" height="170" class="box"/><text x="1068" y="562" class="txt">host/device</text><text x="985" y="586" class="small">moderator checks every 15 min</text><text x="985" y="608" class="small">janitor + moderator host visibility</text>

