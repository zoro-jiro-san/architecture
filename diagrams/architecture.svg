<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760">
  <defs>
    <style>
      .box { fill:#f8fafc; stroke:#334155; stroke-width:2; rx:10; ry:10; }
      .title { font: 700 22px Arial, sans-serif; fill:#0f172a; }
      .txt { font: 14px Arial, sans-serif; fill:#0f172a; }
      .small { font: 12px Arial, sans-serif; fill:#334155; }
      .sandbox { fill:#eef6ff; stroke:#2563eb; stroke-width:2; rx:12; ry:12; }
      .tx { fill:#fff1f2; stroke:#b91c1c; stroke-width:2; rx:10; ry:10; }
      .arrow { stroke:#475569; stroke-width:2; marker-end:url(#m); fill:none; }
    </style>
    <marker id="m" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#475569" />
    </marker>
  </defs>

  <text x="30" y="40" class="title">Zoro Architecture (OpenClaw, Raspberry Pi)</text>

  <rect x="60" y="90" width="180" height="60" class="box"/>
  <text x="95" y="125" class="txt">User (Sarthi)</text>

  <rect x="300" y="80" width="220" height="80" class="box"/>
  <text x="340" y="112" class="txt">main agent</text>
  <text x="330" y="136" class="small">orchestrator + policy gate</text>

  <rect x="560" y="180" width="600" height="360" class="sandbox"/>
  <text x="580" y="210" class="txt">Sandbox Layer (mode=all, scope=session, workspaceAccess=rw)</text>

  <rect x="610" y="250" width="180" height="80" class="box"/>
  <text x="640" y="280" class="txt">research agent</text>
  <text x="642" y="303" class="small">API/Web tasks</text>

  <rect x="830" y="250" width="180" height="80" class="box"/>
  <text x="872" y="280" class="txt">coder agent</text>
  <text x="860" y="303" class="small">code/test tasks</text>

  <rect x="720" y="370" width="180" height="90" class="tx"/>
  <text x="778" y="404" class="txt">tx agent</text>
  <text x="734" y="428" class="small">future payments/transactions</text>

  <rect x="1040" y="250" width="130" height="60" class="box"/>
  <text x="1065" y="286" class="small">External APIs</text>
  <rect x="1040" y="330" width="130" height="60" class="box"/>
  <text x="1068" y="366" class="small">Code Repos</text>
  <rect x="1040" y="410" width="130" height="60" class="box"/>
  <text x="1058" y="446" class="small">Payment Rails</text>

  <rect x="60" y="220" width="220" height="95" class="box"/>
  <text x="85" y="252" class="txt">Secrets Store</text>
  <text x="82" y="276" class="small">~/.openclaw/secrets</text>
  <text x="110" y="298" class="small">chmod 600</text>

  <rect x="60" y="350" width="220" height="100" class="box"/>
  <text x="86" y="382" class="txt">Memory + Learnings</text>
  <text x="78" y="406" class="small">learnings.md / principles</text>
  <text x="88" y="428" class="small">validated distillation</text>

  <path d="M240 120 L300 120" class="arrow"/>
  <path d="M520 120 L610 250" class="arrow"/>
  <path d="M520 120 L830 250" class="arrow"/>
  <path d="M520 120 L790 370" class="arrow"/>

  <path d="M790 290 L1040 280" class="arrow"/>
  <path d="M1010 290 L1040 360" class="arrow"/>
  <path d="M900 420 L1040 440" class="arrow"/>

  <path d="M280 250 L610 290" class="arrow"/>
  <path d="M280 260 L830 290" class="arrow"/>
  <path d="M280 270 L720 420" class="arrow"/>

  <path d="M280 390 L300 390 L300 140" class="arrow"/>

  <text x="60" y="710" class="small">Runtime profile: maxConcurrent=6, subagents.maxConcurrent=12, docker prune every 2h</text>
</svg>
