  <text x="1005" y="607" class="small">host-mode cleanup + watchdog</text>

  <rect x="60" y="220" width="220" height="90" class="box"/>
  <text x="85" y="252" class="txt">Secrets Store</text>
  <text x="82" y="276" class="small">~/.openclaw/secrets (600)</text>

  <rect x="60" y="330" width="220" height="130" class="box"/>
  <text x="82" y="362" class="txt">Observer/Reflector</text>
  <text x="78" y="386" class="small">daily summary</text>
  <text x="78" y="408" class="small">weekly distillation</text>
  <text x="78" y="430" class="small">memory + principles updates</text>

  <rect x="60" y="490" width="220" height="150" class="box"/>
  <text x="100" y="522" class="txt">Ops</text>
  <text x="78" y="546" class="small">task state machine</text>
  <text x="78" y="568" class="small">JSONL audit logs</text>
  <text x="78" y="590" class="small">docker prune schedule</text>
  <text x="78" y="612" class="small">janitor schedule</text>

  <rect x="1180" y="260" width="140" height="60" class="box"/>
  <text x="1202" y="296" class="small">External APIs</text>
  <rect x="1180" y="335" width="140" height="60" class="box"/>
  <text x="1215" y="371" class="small">Repos</text>
  <rect x="1180" y="550" width="140" height="60" class="box"/>
  <text x="1195" y="586" class="small">Payment rails</text>

