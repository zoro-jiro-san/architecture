  <rect x="620" y="260" width="240" height="90" class="box"/>
  <text x="700" y="292" class="txt">research</text>
  <text x="640" y="315" class="small">Crawlee-lite + InsightForge-lite</text>

  <rect x="910" y="260" width="240" height="90" class="box"/>
  <text x="996" y="292" class="txt">coder</text>
  <text x="940" y="315" class="small">ReACT caps + bounded retries</text>

  <rect x="540" y="470" width="760" height="260" class="agent"/>
