  <path d="M530 120 L570 120" class="arrow"/>
  <path d="M790 120 L740 260" class="arrow"/>
  <path d="M790 120 L1030 260" class="arrow"/>
  <path d="M790 120 L820 550" class="arrow"/>
  <path d="M790 120 L1110 550" class="arrow"/>

  <path d="M280 255 L620 305" class="arrow"/>
  <path d="M280 265 L910 305" class="arrow"/>
  <path d="M280 275 L700 590" class="arrow"/>

  <path d="M860 305 L1180 290" class="arrow"/>
  <path d="M1150 305 L1180 365" class="arrow"/>
  <path d="M940 595 L1180 580" class="arrow"/>

  <text x="30" y="860" class="small">Live model: sandbox-first specialists, host janitor, bounded reasoning loops, antfarm-style orchestration controls.</text>
</svg>
