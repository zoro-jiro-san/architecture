  <rect x="700" y="550" width="240" height="100" class="tx"/>
  <text x="795" y="584" class="txt">tx</text>
  <text x="730" y="607" class="small">risk tiers + chain skill packs</text>

  <rect x="980" y="550" width="260" height="100" class="jan"/>
